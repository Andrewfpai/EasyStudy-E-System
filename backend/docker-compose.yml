version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build: .
    container_name: backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.docker
    ports:
      - '5000:5000'

volumes:
  postgres_data:
